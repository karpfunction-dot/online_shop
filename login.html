<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Toko Online</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card login-card">
            <div class="card-header text-white text-center">
                <i class="fas fa-store fa-3x mb-2"></i>
                <h3>Admin Login</h3>
                <small>Toko Online Siswa</small>
            </div>
            <div class="card-body p-4">
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="fas fa-user me-2"></i>Username</label>
                        <input type="text" id="username" class="form-control" placeholder="admin" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="fas fa-lock me-2"></i>Password</label>
                        <input type="password" id="password" class="form-control" placeholder="password123" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-login">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>
                    <div class="mt-3 text-center">
                        <a href="index.html" class="back-link"><i class="fas fa-arrow-left me-1"></i>Kembali</a>
                    </div>
                    <hr>
                    <div class="text-center small">Login: <strong>admin</strong> / <strong>password123</strong></div>
                </form>
            </div>
        </div>
    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (login(username, password)) {
                window.location.href = 'dashboard.html';
            } else {
                alert('Login gagal! Gunakan admin / password123');
            }
        });
    </script>
</body>
</html>
