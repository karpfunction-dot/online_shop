<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etalase Produk - Toko Online Siswa</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand" href="#" onclick="location.reload()">
                <i class="fas fa-store me-2"></i>Etalase Produk Siswa
            </a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">
                            <i class="fas fa-sign-in-alt me-1"></i> Login Admin
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="notificationToast" class="toast-notification" style="display: none;">
        <div class="alert alert-success alert-dismissible fade show mb-0 shadow">
            <i class="fas fa-sync-alt me-2"></i>
            <span id="toastMessage"></span>
            <button type="button" class="btn-close" onclick="this.closest('.toast-notification').style.display='none'"></button>
        </div>
    </div>

    <div id="userInfo" class="user-info" style="display: none;">
        <i class="fas fa-user-shield"></i> Admin Online
        <i class="fas fa-sign-out-alt logout-quick" onclick="logout()"></i>
    </div>

    <div class="container mt-4">
        <div class="hero-section text-center text-white">
            <h1 class="display-5 fw-bold"><i class="fas fa-box-open me-2"></i>Koleksi Produk Kami</h1>
            <p>Produk berkualitas dari siswa-siswi kreatif</p>
            <div class="small"><i class="fas fa-clock me-1"></i> Update: <span id="lastUpdateTime">-</span></div>
        </div> 
        <div class="row" id="productListFront"></div>
    </div>

    <a href="dashboard.html" id="adminBtn" class="btn btn-dark btn-admin" style="display: none;">
        <i class="fas fa-tachometer-alt me-2"></i>Dashboard Admin
    </a>

    <div class="sync-badge"><i class="fas fa-sync-alt me-1"></i> Sinkronisasi otomatis aktif</div>

    <footer class="footer text-white text-center p-4 mt-5">
        <div class="container">
            <i class="fas fa-store me-2"></i> &copy; 2026 Toko Online Siswa
        </div>
    </footer>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/etalase.js"></script>
</body>
</html>
